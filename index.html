<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MILK BOTTLE🥛</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap" rel="stylesheet" />
    <link id="mainStyle" rel="stylesheet" href="style.css" />
    <script>
        document.getElementById('mainStyle').href = 'style.css?v=' + Date.now();
    </script>
</head>

<body>
    <main class="app">
        <h1>MILK BOTTLE</h1>

        <div id="dateHeader" class="date-header"></div>

        <div class="tab-bar">
            <button id="tabBottleBtn" class="tab-btn active" type="button">MILK</button>
            <button id="tabEmotionBtn" class="tab-btn" type="button">EMOTION</button>
        </div>

        <div id="pageBottle" class="tab-page">

        <div class="bottle-card">

            <!-- ボトルラッパー -->
            <div class="bottle-wrapper">
                <!-- ミルクの溜まり具合に応じて瓶の左右に出現する❤ -->
                <div id="heartsLayer" class="hearts-layer"></div>
                <!-- SVGボトル -->
                <svg id="bottleSvg" viewBox="0 0 140 280" xmlns="http://www.w3.org/2000/svg" aria-label="milk bottle">
                    <defs>
                        <clipPath id="bottleClip">
                            <path d="M 20,4 L 120,4 C 132,4 136,16 136,50 C 136,90 134,120 134,151 C 134,182 136,210 136,252 A 18,24 0 0 1 118,276 L 22,276 A 18,24 0 0 1 4,252 C 4,210 6,182 6,151 C 6,120 4,90 4,50 C 4,16 8,4 20,4 Z"/>
                        </clipPath>
                        <linearGradient id="dripGrad" x1="0" y1="0" x2="1" y2="0">
                            <stop offset="0%" stop-color="#fff" stop-opacity="0.1"/>
                            <stop offset="45%" stop-color="#fff" stop-opacity="0.55"/>
                            <stop offset="100%" stop-color="#e8ddc8" stop-opacity="0.15"/>
                        </linearGradient>
                    </defs>
                    <g clip-path="url(#bottleClip)">
                        <rect x="0" y="0" width="140" height="280" fill="#fff"/>
                        <g id="milkGroup">
                            <rect id="milkFill" x="0" y="280" width="140" height="280" fill="#fff8dc"/>
                            <g id="waveGroup">
                                <path id="wave1" fill="rgba(255,248,220,0.85)"
                                    d="M-140,0 C-105,-14 -70,14 -35,0 C0,-14 35,14 70,0 C105,-14 140,14 175,0 C210,-14 245,14 280,0 L280,280 L-140,280 Z"/>
                                <path id="wave2" fill="rgba(255,248,220,0.6)"
                                    d="M-140,5 C-100,-12 -65,16 -25,5 C15,-10 50,16 90,5 C130,-10 165,16 205,5 C245,-10 280,16 320,5 L320,280 L-140,280 Z"/>
                            </g>
                        </g>
                        <!-- ミルクの溜まり具合に応じてガラス表面を滴る液体 -->
                        <g id="dripsGroup"></g>
                    </g>
                    <!-- ガラスのアウトライン -->
                    <path d="M 20,4 L 120,4 C 132,4 136,16 136,50 C 136,90 134,120 134,151 C 134,182 136,210 136,252 A 18,24 0 0 1 118,276 L 22,276 A 18,24 0 0 1 4,252 C 4,210 6,182 6,151 C 6,120 4,90 4,50 C 4,16 8,4 20,4 Z"
                        fill="none" stroke="#333" stroke-width="4" stroke-linejoin="round"/>
                    <!-- 目盛り線 -->
                    <line x1="18" y1="189" x2="122" y2="189" stroke="#888" stroke-width="2" stroke-dasharray="5,4"/>
                    <line x1="18" y1="98" x2="122" y2="98" stroke="#888" stroke-width="2" stroke-dasharray="5,4"/>
                    <!-- ガラスのハイライト -->
                    <path d="M 24,24 C 22,70 22,140 24,200" stroke="rgba(255,255,255,0.6)" stroke-width="5" fill="none" stroke-linecap="round"/>
                </svg>

            </div>

            <div id="status">0 / 3</div>
            <div id="message">Empty...</div>
            <div id="overflowMessage" class="overflow-message"></div>
            <div id="recoveryTimer" class="recovery-timer"></div>
            <div id="trackingInfo" class="tracking-info"></div>

            <div class="actions">
                <button id="addBtn" type="button">+MILK</button>
                <button id="drinkBtn" type="button">💦</button>
                <button id="clearBtn" type="button">reset data</button>
            </div>
        </div>

        <section class="panel">
            <h2>Count</h2>
            <div id="stats" class="stats"></div>
        </section>

        <section class="panel">
            <h2>Logs</h2>
            <div id="logList" class="log-list"></div>
        </section>

        <!-- 噴出パーティクル用Canvas（カード・タイトルをまたいで最前面に表示） -->
        <canvas id="burstCanvas"></canvas>

        </div>

        <div id="pageEmotion" class="tab-page" hidden>

        <div class="bottle-card emotion-card">
            <div class="emotion-title">EMOTION</div>
            <div class="energy-icon-wrap">
                <div id="energyHeartsLayer" class="hearts-layer"></div>
                <div id="energyIcon" class="energy-icon">
                    <img id="energyIconImg" class="energy-icon-img" src="" alt="" />
                </div>
            </div>
            <div id="energyLevelStatus" class="energy-level-status">Lv0</div>
            <div class="actions">
                <button id="energyBtn" class="energy-btn" type="button">⚡</button>
                <button id="energyMinusBtn" class="btn-small" type="button">-</button>
            </div>
            <div class="energy-graph-wrap">
                <svg id="energyGraph" viewBox="0 0 320 120" preserveAspectRatio="none" aria-label="energy history"></svg>
            </div>

            <div class="energy-image-manager">
                <label class="btn-small file-label" for="energyImageInput">画像を追加</label>
                <input id="energyImageInput" type="file" accept="image/*" multiple hidden />
                <button id="energyImageClearBtn" class="btn-small" type="button">登録画像を削除</button>
                <div id="energyImageCount" class="energy-image-count"></div>
            </div>
        </div>

        </div>
    </main>

    <script src="icon/icons.js?v=1"></script>
    <script>
        (function () {
            var s = document.createElement('script');
            s.src = 'script.js?v=' + Date.now();
            document.body.appendChild(s);
        })();
    </script>
</body>

</html>
